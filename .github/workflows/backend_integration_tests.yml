name: AR Backend Integration Tests
on: [push, pull_request]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    # Step 1: Spin up Postgres
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: audiorating_db
          POSTGRES_USER: audiorating_user
          POSTGRES_PASSWORD: audiorating_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Step 2: Install and configure Nginx to serve the frontend and proxy to the backend
    steps:
      - uses: actions/checkout@v6

      - name: Install Nginx
        run: sudo apt-get update && sudo apt-get install -y nginx

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v7

      - name: Configure Nginx
        run: |
          # Stop system nginx to avoid port conflicts
          sudo systemctl stop nginx

          # Set environment variable for frontend path and generate nginx config
          export FRONTEND_PATH="$GITHUB_WORKSPACE/frontend/"
          envsubst '$FRONTEND_PATH' < dev_tools/ci/webserver_config/ci.nginx.conf > /tmp/nginx.conf

          # Copy frontend settings file
          cp dev_tools/ci/frontend_settings/ar_settings.ci.js frontend/src/settings/ar_settings.js

          # Start our custom nginx using the file checked into the repo
          # We use -p /tmp/ to set the prefix path for logs/pids
          sudo nginx -c /tmp/nginx.conf -p /tmp/


      # Step 3: Run the Backend
      - name: Start FastAPI Backend
        run: |
          cp dev_tools/ci/backend_settings/.env.ci backend/.env
          cd backend
          # Start in background
          uv run uvicorn audiorating_backend.api:app --host 127.0.0.1 --port 8000 &
          # Wait for it to be alive (FastAPI exposes API docs at /docs automatically)
          timeout 60s bash -c 'until curl -s http://127.0.0.1:8000/docs > /dev/null; do sleep 3; done'

      # Step 4: Install test dependencies
      - name: Install dev dependencies
        run: |
          cd backend
          uv sync --frozen --group dev

      # Step 4: Run the Tests
      - name: Run Pytest
        env:
          # Point tests to the NGINX port, not the Uvicorn port
          BASE_URL: http://localhost:3000/ar_backend
        run: |
          cd backend
          uv run pytest tests/integration