services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: audiorating_db
      POSTGRES_USER: audiorating_user
      POSTGRES_PASSWORD: audiorating_password
    volumes:
      - ar-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiorating_user -d audiorating_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../dev_tools/docker/backend.Dockerfile
    working_dir: /workspace/backend
    command: >-
      sh -lc "uv sync --dev &&
      uv run uvicorn audiorating_backend.api:app --reload --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/workspace/backend
      - ar-dev-backend-venv:/workspace/backend/.venv
      - ar-dev-uv-cache:/root/.cache/uv
      - ./dev_tools/docker/backend_settings/.env.dev-docker:/workspace/backend/.env:ro

  web:
    image: nginx:1.30-alpine
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/usr/share/nginx/html/rate:ro
      - ./dev_tools/docker/frontend_settings/ar_settings.dev-docker.js:/usr/share/nginx/html/rate/settings/ar_settings.js:ro
      - ./dev_tools/docker/webserver_config/dev.docker.nginx.conf:/etc/nginx/conf.d/default.conf:ro

  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    profiles:
      - e2e
    working_dir: /workspace/frontend
    depends_on:
      - web
    environment:
      PLAYWRIGHT_BASE_URL: http://web:3000/rate/
    volumes:
      - ./frontend:/workspace/frontend
      - ar-dev-e2e-node-modules:/workspace/frontend/node_modules
      - ar-dev-npm-cache:/root/.npm
    command: >-
      sh -lc "npm install && npx playwright test"

volumes:
  ar-dev-postgres-data:
  ar-dev-backend-venv:
  ar-dev-uv-cache:
  ar-dev-e2e-node-modules:
  ar-dev-npm-cache:
