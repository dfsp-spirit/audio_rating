# CI-specific Nginx configuration
pid /tmp/nginx.pid;
error_log /tmp/error.log;

# Run nginx as the user that owns the checked-out files
# In GitHub Actions, this is the 'runner' user. Otherwise nginx has to read access to server frontend files.
user runner;


events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    access_log /tmp/access.log;

    server {
        listen 3000;

        # We serve frontend from the GITHUB_WORKSPACE location
        location /rate/ {
            alias $FRONTEND_PATH; # Use $FRONTEND_PATH which we will inject during the CI step in workflow yml file
            try_files $uri $uri/ /index.html;
        }

        # Backend proxy
        location /ar_backend/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
        }
    }
}