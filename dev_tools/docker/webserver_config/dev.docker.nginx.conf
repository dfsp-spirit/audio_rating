server {
    listen 3000;
    server_name localhost;

    # Temporary directory for buffering large request bodies.
    client_body_temp_path /var/lib/nginx/tmp;

    location = /favicon.ico {
        alias /usr/share/nginx/html/rate/favicon.ico;
    }

    location /rate/ {
        alias /usr/share/nginx/html/rate/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /ar_backend/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        return 404 "This development server only serves paths under '/rate/' and '/ar_backend/'.\n\nTry:\n  * frontend: /rate/study.html\n  * API docs: /ar_backend/api/docs\n  * admin interface: /ar_backend/admin\n";
    }
}
